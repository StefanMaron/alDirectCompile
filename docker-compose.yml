services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      MSSQL_MEMORY_LIMIT_MB: "1024"
    ports:
      - "11433:1433"
    volumes:
      - bc-artifacts:/bc/artifacts:ro
      # tmpfs for SQL data: keeps DB in RAM for faster restore + queries
      # CRONUS .bak is ~860MB, restored DB is ~1.2GB
      - type: tmpfs
        target: /var/opt/mssql/data
        tmpfs:
          size: 1610612736  # 1.5GB
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:-Passw0rd123!}' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    build:
      context: .
      dockerfile: StartupHook/Dockerfile
    stdin_open: true
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "7045-7054:7045-7054"
      - "7085-7089:7085-7089"
    environment:
      BC_ARTIFACT_URL: ${BC_ARTIFACT_URL:-}
      BC_TYPE: ${BC_TYPE:-sandbox}
      BC_VERSION: ${BC_VERSION:-27.5.46862.48004}
      BC_COUNTRY: ${BC_COUNTRY:-w1}
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      SQL_SERVER: sql
    volumes:
      - bc-artifacts:/bc/artifacts
      # tmpfs for service tier: keeps DLL I/O in RAM (extension compilation writes here)
      # Service tier is ~600MB, compiled extensions add ~200MB
      - type: tmpfs
        target: /bc/service
        tmpfs:
          size: 1073741824  # 1GB

volumes:
  bc-artifacts:
