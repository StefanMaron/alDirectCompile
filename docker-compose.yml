services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Passw0rd123!"
      MSSQL_MEMORY_LIMIT_MB: "2048"
    ports:
      - "11433:1433"
    volumes:
      - ./artifacts/onprem/27.5.46862.0/w1/database:/backup:ro
    tmpfs:
      - /var/opt/mssql/data:size=2g
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Passw0rd123!' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    build:
      context: .
      dockerfile: StartupHook/Dockerfile
    stdin_open: true
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "7045:7045"
      - "7047:7047"
      - "7048:7048"
      - "7049:7049"
      - "7085:7085"
      - "7086:7086"
    volumes:
      - bc-cache:/usr/share/Microsoft/Microsoft Dynamics NAV/270/Server
    tmpfs:
      - /tmp:size=512m
    environment:
      DOTNET_STARTUP_HOOKS: /bc/hook/StartupHook.dll

volumes:
  bc-cache:
