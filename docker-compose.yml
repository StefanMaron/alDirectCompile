services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Passw0rd123!"
    ports:
      - "11433:1433"
    volumes:
      - ./artifacts/onprem/27.5.46862.0/w1/database:/backup:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Passw0rd123!' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    build:
      context: .
      dockerfile: StartupHook/Dockerfile
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "17045:17045"
      - "17047:17047"
      - "17048:17048"
      - "17049:17049"
      - "17085:17085"
      - "17086:17086"
    environment:
      DOTNET_STARTUP_HOOKS: /bc/hook/StartupHook.dll
